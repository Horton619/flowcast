name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS arm64 — builds on Apple Silicon runner. Native PyInstaller arm64.
  # ---------------------------------------------------------------------------
  release-mac-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller sounddevice soundfile numpy python-osc

      - name: Build PyInstaller backend (arm64)
        run: |
          cd backend
          pyinstaller --clean main.spec

      - name: Install Node dependencies
        run: npm ci

      - name: Build unpackaged app (arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --dir --arm64

      - name: Ad-hoc code sign (fixes macOS "damaged" Gatekeeper error)
        run: |
          find dist -name "FlowCast.app" -maxdepth 3 | while read app; do
            echo "Signing: $app"
            codesign --deep --force --sign - "$app"
          done

      - name: Package & publish arm64 DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg --arm64 --prepackaged dist/mac-arm64 --publish always

  # ---------------------------------------------------------------------------
  # macOS x64 (Intel) — currently disabled. The macos-13 runner queue is
  # heavily backed up; re-enable when we want to ship Intel Macs again.
  # See git history for the original job definition.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Windows x64 — NSIS installer
  # ---------------------------------------------------------------------------
  release-win:
    runs-on: windows-latest
    needs: release-mac-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller sounddevice soundfile numpy python-osc

      - name: Build PyInstaller backend (Windows)
        shell: bash
        run: |
          cd backend
          pyinstaller --clean main.spec

      - name: Install Node dependencies
        run: npm ci

      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win

      - name: Mark release as published
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release edit "$TAG" --repo ${{ github.repository }} --draft=false --latest
