name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS arm64 — builds on Apple Silicon runner. Native PyInstaller arm64.
  # ---------------------------------------------------------------------------
  release-mac-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller -r backend/requirements.txt

      - name: Build PyInstaller backend (arm64)
        run: |
          cd backend
          pyinstaller --clean main.spec

      - name: Install Node dependencies
        run: npm ci

      - name: Build, sign, notarize, publish (arm64)
        env:
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          # Apple Developer ID signing — .p12 cert + password
          CSC_LINK:                    ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD:            ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization — Apple ID + app-specific password + team
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --arm64 --publish always

  # ---------------------------------------------------------------------------
  # macOS x64 (Intel) — currently disabled. The macos-13 runner queue is
  # heavily backed up; re-enable when we want to ship Intel Macs again.
  # See git history for the original job definition.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Windows x64 — NSIS installer
  # ---------------------------------------------------------------------------
  release-win:
    runs-on: windows-latest
    needs: release-mac-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller -r backend/requirements.txt

      - name: Build PyInstaller backend (Windows)
        shell: bash
        run: |
          cd backend
          pyinstaller --clean main.spec

      - name: Install Node dependencies
        run: npm ci

      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win

      - name: Mark release as published
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release edit "$TAG" --repo ${{ github.repository }} --draft=false --latest
