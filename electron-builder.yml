appId: net.veproductions.flowcast
productName: FlowCast
copyright: "© 2026 Visual Entropy Productions"

directories:
  output: dist
  buildResources: assets

files:
  - main.js
  - preload.js
  - renderer/**
  - "!backend/**"
  - "!node_modules/**"
  - "!dist/**"

extraResources:
  - from: backend/dist/flowcast_backend
    to: backend/flowcast_backend
    filter:
      - "**/*"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.music
  icon: assets/icon.icns

win:
  target:
    - nsis
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: Horton619
  repo: flowcast
